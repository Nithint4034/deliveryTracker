{% extends 'tracker/base.html' %}

{% block title %}Delete {{ tracker_title }} Entry - Delivery Tracker{% endblock %}

{% block content %}
<h2>Delete {{ tracker_title }} Entry</h2>

<p>Are you sure you want to delete the entry for week "{{ object.week_display }}"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" style="background-color: #dc3545; color: white; padding: 0.5rem 1rem; border: none; border-radius: 4px; cursor: pointer;">Yes, Delete</button>
    <a href="{% url cancel_url_name %}" style="margin-left: 1rem; color: #6c757d; text-decoration: none;">Cancel</a>
</form>
{% endblock %}
