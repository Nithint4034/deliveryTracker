<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Delivery Tracker{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: #333;
            color: white;
            padding: 1rem;
            text-align: center;
        }
        nav {
            background-color: #444;
            padding: 0.5rem;
        }
        nav a {
            color: white;
            margin: 0 1rem;
            text-decoration: none;
        }
        main {
            padding: 2rem;
            max-width: 1500px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <header>
        <h1>Delivery Tracker</h1>
    </header>
    <nav>
        <a href="/">Home</a>
        <a href="/tracker/">Delivery Tracker</a>
        <a href="/tracker-2/">Delivery Tracker - Mexico</a>
        <a href="/client-delivery/">Client Delivery Status</a>
        <a href="/admin/">Admin</a>
        {% if user.is_authenticated %}
        <span style="color: #ddd; margin-left: 1rem;">Signed in as {{ user.username }}</span>
        <form method="post" action="{% url 'logout' %}" style="display: inline; margin-left: 0.75rem;">
            {% csrf_token %}
            <button type="submit" style="background: #666; color: #fff; border: none; border-radius: 4px; padding: 0.35rem 0.6rem; cursor: pointer;">Logout</button>
        </form>
        {% else %}
        <a href="{% url 'login' %}">Login</a>
        {% endif %}
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>

</body>
</html>
